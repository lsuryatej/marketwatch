version: "3.8"

services:
  # PostgreSQL with TimescaleDB extension enabled
  database:
    image: timescale/timescaledb:latest-pg14
    container_name: market_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market
    volumes:
      - db_data:/var/lib/postgresql/data
      # Apply schema at startup
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # REST API service
  api:
    build: ./api
    container_name: market_api
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/market
      # By default the API will listen on 0.0.0.0:8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  # News ingestion service
  ingest-news:
    build: ./ingest-news
    container_name: ingest_news
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/market
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      GDELT_BASE_URL: ${GDELT_BASE_URL:-https://api.gdeltproject.org/api/v2/doc/doc?query=stocks%20OR%20earnings&mode=ArtList}
      POLLING_INTERVAL_SECONDS: ${NEWS_POLLING_INTERVAL_SECONDS:-300}
    restart: unless-stopped

  # Price ingestion service
  ingest-prices:
    build: ./ingest-prices
    container_name: ingest_prices
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/market
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      USE_DUMMY_PRICES: ${USE_DUMMY_PRICES:-true}
      PRICE_POLLING_INTERVAL_SECONDS: ${PRICE_POLLING_INTERVAL_SECONDS:-60}
    restart: unless-stopped

  # Next.js front‑end
  web:
    build: ./web
    container_name: market_web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  db_data: